root = "."
tmp_dir = "tmp"
env_files = [".env"]

[build]
  cmd = "go build -o ./tmp/main ./cmd/main"
  entrypoint = ["./tmp/main"]

  delay = 500
  include_dir = ["cmd/main", "internal"]
  include_ext = ["go"]

  exclude_dir = [
    "tmp",
    "bin",
    "vendor",
    ".git",
    "web",
    "internal/web/files",
    "migrations",
    "cmd/migrate"
  ]

  log = "tmp/build-errors.log"
  stop_on_error = true